<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Log</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ── */
  :root {
    --bg:         #000000;
    --bg2:        #0d0d0d;
    --bg3:        #111111;
    --border:     #1e1e1e;
    --border2:    #2a2a2a;
    --text:       #e0e0e0;
    --text2:      #888888;
    --text3:      #444444;
    --text-muted: #333333;
    --done-text:  #666666;   /* visible but clearly done */
    --done-line:  #444444;
    --line:       #111111;
    --add-bg:     #ffffff;
    --add-fg:     #000000;
    --tag-sel-bg: #111111;
    --tag-sel-border: #555;
    --conn:       #3dff9a;
    --toast-bg:   #1a1a1a;
    --toast-border:#2a2a2a;
    --spin-track: #222;
    --spin-head:  #fff;
  }

  [data-theme="light"] {
    --bg:         #f5f5f5;
    --bg2:        #efefef;
    --bg3:        #e8e8e8;
    --border:     #ddd;
    --border2:    #ccc;
    --text:       #111111;
    --text2:      #555555;
    --text3:      #888888;
    --text-muted: #aaaaaa;
    --done-text:  #999999;
    --done-line:  #bbbbbb;
    --line:       #e0e0e0;
    --add-bg:     #111111;
    --add-fg:     #ffffff;
    --tag-sel-bg: #e0e0e0;
    --tag-sel-border: #555;
    --conn:       #16a34a;
    --toast-bg:   #ffffff;
    --toast-border:#ddd;
    --spin-track: #ddd;
    --spin-head:  #111;
  }

  /* ── RESET ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    transition: background .2s, color .2s;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 99; flex-direction: column; gap: 12px;
  }
  .spin {
    width: 20px; height: 20px;
    border: 2px solid var(--spin-track);
    border-top-color: var(--spin-head);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading span { font-size: 12px; color: var(--text3); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--toast-bg); border: 1px solid var(--toast-border);
    border-radius: 6px; padding: 8px 16px;
    font-size: 12px; color: var(--text2);
    z-index: 200; transition: transform .2s ease; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LAYOUT ── */
  #app { display: none; max-width: 680px; margin: 0 auto; padding: 36px 20px 80px; }

  /* ── HEADER ── */
  .header { margin-bottom: 32px; }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .conn-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); transition: background .3s; flex-shrink: 0;
  }
  .conn-dot.live { background: var(--conn); box-shadow: 0 0 6px var(--conn); }
  .header-date { font-size: 12px; color: var(--text3); }

  /* ── HEADER ACTIONS ── */
  .hdr-actions { display: flex; align-items: center; gap: 8px; }

  /* Theme toggle */
  .theme-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; color: var(--text3);
    transition: all .15s; font-size: 14px;
  }
  .theme-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* Browse btn */
  .browse-btn {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 11px; color: var(--text3); font-size: 11px;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .browse-btn:hover { border-color: var(--border2); color: var(--text2); }
  .browse-btn.on { border-color: var(--tag-sel-border); color: var(--text); background: var(--bg3); }

  /* ── INPUT AREA ── */
  .input-area { margin-bottom: 36px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .main-input {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px;
    color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color .15s;
  }
  .main-input:focus { border-color: var(--border2); }
  .main-input::placeholder { color: var(--text-muted); }

  .add-btn {
    background: var(--add-bg); color: var(--add-fg);
    border: none; border-radius: 8px;
    padding: 11px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s; white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }
  .add-btn:hover { opacity: .85; }

  /* ── TAGS ── */
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag-row-label { font-size: 11px; color: var(--text-muted); margin-right: 2px; }
  .tag-opt {
    background: transparent; border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px;
    font-size: 11px; color: var(--text3); cursor: pointer;
    transition: all .15s; font-family: 'Inter', sans-serif;
  }
  .tag-opt:hover { border-color: var(--border2); color: var(--text2); }
  .tag-opt.sel { border-color: var(--tag-sel-border); color: var(--text); background: var(--tag-sel-bg); }

  /* ── SECTION ── */
  .section { margin-bottom: 36px; }
  .sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
  }
  .sec-label.today { color: var(--text); }
  .sec-count { font-size: 11px; color: var(--text-muted); }
  .sec-line { flex: 1; height: 1px; background: var(--line); }
  .sec-date-tag { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

  /* ── INLINE ADD (browse) ── */
  .sec-add { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .sec-add-input {
    flex: 1; background: transparent; border: none;
    border-bottom: 1px solid var(--border);
    padding: 6px 0; color: var(--text2); font-size: 13px;
    font-family: 'Inter', sans-serif; outline: none; transition: border-color .15s;
    min-width: 140px;
  }
  .sec-add-input:focus { border-color: var(--border2); color: var(--text); }
  .sec-add-input::placeholder { color: var(--text-muted); }
  .sec-tag-sel {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px;
    font-size: 10px; color: var(--text2); font-family: 'Inter', sans-serif;
    outline: none; cursor: pointer;
  }
  .sec-add-btn {
    background: transparent; border: none; color: var(--text3);
    font-size: 11px; font-family: 'Inter', sans-serif;
    cursor: pointer; padding: 4px 0; transition: color .15s; white-space: nowrap;
  }
  .sec-add-btn:hover { color: var(--text2); }

  /* ── TASK ── */
  .task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--line);
    animation: fi .15s ease;
    transition: opacity .15s;
    position: relative;
  }
  @keyframes fi { from { opacity: 0; } to { opacity: 1; } }
  .task:last-child { border-bottom: none; }
  .task.dragging  { opacity: .15; }
  .task.drag-over { border-top: 1px solid var(--text3); }

  /* drag handle — invisible until hover */
  .drag-handle {
    display: flex; align-items: center; flex-shrink: 0;
    cursor: grab; padding-top: 2px; width: 14px;
    color: transparent; transition: color .2s;
  }
  .task:hover .drag-handle { color: var(--border2); }
  .drag-handle:active { cursor: grabbing; }

  /* task actions — fade in on hover */
  .task-actions {
    display: flex; align-items: center; gap: 1px;
    flex-shrink: 0; opacity: 0; transition: opacity .15s;
  }
  .task:hover .task-actions { opacity: 1; }

  /* edit / delete */
  .task-btn {
    width: 24px; height: 24px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 4px;
    transition: color .15s;
    border: none; background: transparent; color: var(--text-muted);
  }
  .task-btn:hover        { color: var(--text2); }
  .task-btn.del:hover    { color: #f55; }

  /* inline edit */
  .task-edit-input {
    flex: 1; background: transparent; border: none;
    border-bottom: 1px solid var(--border2);
    color: var(--text); font-size: 14px;
    font-family: 'Inter', sans-serif; outline: none;
    padding: 1px 0; line-height: 1.4; width: 100%;
  }

  /* Checkbox */
  .cb {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 1px solid var(--border2); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; margin-top: 2px;
    transition: all .2s; background: transparent;
  }
  .cb:hover { border-color: var(--text3); }
  .task.done .cb {
    background: var(--text);
    border-color: var(--text);
  }
  .cb svg { display: none; }
  .task.done .cb svg { display: block; }

  /* Task text */
  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 14px; color: var(--text);
    line-height: 1.4; word-break: break-word; margin-bottom: 5px;
  }
  /* DONE — clearly readable but visually distinct */
  .task.done .task-text {
    text-decoration: line-through;
    text-decoration-color: var(--done-line);
    color: var(--done-text);
  }

  .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* ── TAG PILLS ── */
  .tag-pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; border: 1px solid; }
  .tag-design        { color: #b87cff; border-color: #b87cff33; background: #b87cff0a; }
  .tag-design-change { color: #ff6fd8; border-color: #ff6fd833; background: #ff6fd80a; }
  .tag-research      { color: #50ccff; border-color: #50ccff33; background: #50ccff0a; }
  .tag-feedback      { color: #ff9e50; border-color: #ff9e5033; background: #ff9e500a; }
  .tag-meeting       { color: #ff7eb3; border-color: #ff7eb333; background: #ff7eb30a; }
  .tag-dev           { color: #3dffaa; border-color: #3dffaa33; background: #3dffaa0a; }
  .tag-review        { color: #e8ff47; border-color: #e8ff4733; background: #e8ff470a; }
  .tag-other         { color: #888;    border-color: #33333344; background: transparent; }

  /* light mode — slightly deeper tag backgrounds */
  [data-theme="light"] .tag-design        { background: #b87cff18; }
  [data-theme="light"] .tag-design-change { background: #ff6fd818; }
  [data-theme="light"] .tag-research      { background: #50ccff18; }
  [data-theme="light"] .tag-feedback      { background: #ff9e5018; }
  [data-theme="light"] .tag-meeting       { background: #ff7eb318; }
  [data-theme="light"] .tag-dev           { background: #3dffaa18; color: #16a34a; border-color: #16a34a33; }
  [data-theme="light"] .tag-review        { color: #a0920a; border-color: #a0920a33; background: #a0920a18; }
  [data-theme="light"] .tag-other         { color: #666; border-color: #ccc; background: transparent; }

  .task-time { font-size: 11px; color: var(--text-muted); }



  /* ── EMPTY ── */
  .empty { padding: 16px 0; color: var(--text-muted); font-size: 13px; }

  /* ── ERR ── */
  #err { display: none; color: #ff5555; font-size: 12px; padding: 12px 0; }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><span>Connecting…</span></div>
<div class="toast" id="toast"></div>

<div id="app">
  <div id="err"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="header-title">Daily Log</div>
        <div class="conn-dot" id="cdot"></div>
      </div>
      <div class="hdr-actions">
        <!-- Theme toggle -->
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">
          <span id="theme-icon">☀</span>
        </button>
        <!-- Browse -->
        <button class="browse-btn" id="browse-btn" onclick="toggleBrowse()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span id="browse-label">Browse by date</span>
        </button>
      </div>
    </div>
    <div class="header-date" id="hdr-date"></div>
  </div>

  <!-- ── MAIN VIEW ── -->
  <div id="view-main">
    <div class="input-area">
      <div class="input-row">
        <input class="main-input" id="t-inp"
          placeholder="What did you work on / what's next?"
          onkeydown="if(event.key==='Enter') addTask()" />
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
      <div class="tag-row">
        <span class="tag-row-label">Tag</span>
        <button class="tag-opt sel"  data-tag="design"        onclick="selectTag(this)">Design</button>
        <button class="tag-opt"      data-tag="design-change" onclick="selectTag(this)">Design Change</button>
        <button class="tag-opt"      data-tag="research"      onclick="selectTag(this)">Research</button>
        <button class="tag-opt"      data-tag="feedback"      onclick="selectTag(this)">Feedback</button>
        <button class="tag-opt"      data-tag="meeting"       onclick="selectTag(this)">Meeting</button>
        <button class="tag-opt"      data-tag="dev"           onclick="selectTag(this)">Dev</button>
        <button class="tag-opt"      data-tag="review"        onclick="selectTag(this)">Review</button>
        <button class="tag-opt"      data-tag="other"         onclick="selectTag(this)">Other</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-hdr">
        <div class="sec-label today">Today</div>
        <div class="sec-count" id="cnt-today"></div>
        <div class="sec-line"></div>
      </div>
      <div id="list-today"></div>
    </div>

    <div class="section">
      <div class="sec-hdr">
        <div class="sec-label">Yesterday</div>
        <div class="sec-count" id="cnt-yesterday"></div>
        <div class="sec-line"></div>
      </div>
      <div id="list-yesterday"></div>
    </div>
  </div>

  <!-- ── BROWSE VIEW ── -->
  <div id="view-browse" style="display:none">
    <div id="browse-sections"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, update, remove }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey:            "AIzaSyCi7mHt4-jjf-pofPEYPlecTHMQdW0eDKc",
  authDomain:        "todo-52670.firebaseapp.com",
  databaseURL:       "https://todo-52670-default-rtdb.firebaseio.com",
  projectId:         "todo-52670",
  storageBucket:     "todo-52670.firebasestorage.app",
  messagingSenderId: "101944053857",
  appId:             "1:101944053857:web:51a1109c125e00d1969a20"
});
const db   = getDatabase(app);
const TREF = ref(db, 'daily_tasks');

let allTasks   = [];
let activeTag  = 'design';
let browseMode = false;

/* ── utils ── */
const $    = id => document.getElementById(id);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toast = (m,d=2000) => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),d); };

/* ── theme ── */
const saved = localStorage.getItem('dl_theme') || 'dark';
document.documentElement.setAttribute('data-theme', saved);
document.addEventListener('DOMContentLoaded', () => {
  updateThemeIcon(saved);
});
function updateThemeIcon(t) {
  const icon = $('theme-icon');
  if(icon) icon.textContent = t === 'dark' ? '☀' : '🌙';
}
window.toggleTheme = () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('dl_theme', next);
  updateThemeIcon(next);
};

/* ── dates ── */
function dateStr(offset=0) {
  const d=new Date(); d.setDate(d.getDate()+offset); return d.toISOString().slice(0,10);
}
function timeStr12() {
  const now=new Date();
  let h=now.getHours(), m=now.getMinutes();
  const ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}
function prettyDate(ymd) {
  if(!ymd) return '';
  const [y,mo,d]=ymd.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dt=new Date(+y,+mo-1,+d);
  if(ymd===dateStr(0)) return 'Today';
  if(ymd===dateStr(-1)) return 'Yesterday';
  return `${days[dt.getDay()]}, ${+d} ${months[+mo-1]}`;
}
function formatHeader() {
  const now=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  $('hdr-date').textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

/* ── tag ── */
window.selectTag = btn => {
  document.querySelectorAll('.tag-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  activeTag=btn.dataset.tag;
};

/* ── browse ── */
window.toggleBrowse = () => {
  browseMode=!browseMode;
  $('browse-btn').classList.toggle('on',browseMode);
  $('browse-label').textContent=browseMode?'← Back':'Browse by date';
  $('view-main').style.display=browseMode?'none':'block';
  $('view-browse').style.display=browseMode?'block':'none';
  if(browseMode) renderBrowse();
};

/* ── firebase ── */
onValue(TREF, snap => {
  const raw=snap.val()||{};
  allTasks=Object.entries(raw).map(([id,v])=>({id,...v}));
  render();
  $('cdot').classList.add('live');
  $('loading').style.display='none';
  $('app').style.display='block';
}, err => {
  $('loading').style.display='none';
  $('app').style.display='block';
  $('err').textContent='⚠ '+err.message+' — set Realtime DB rules to read/write: true';
  $('err').style.display='block';
});

/* ── add (main — today) ── */
window.addTask = () => {
  const inp=$('t-inp'), text=inp.value.trim(); if(!text) return; inp.value='';
  push(TREF,{text,tag:activeTag,done:false,date:dateStr(0),time:timeStr12(),createdAt:Date.now()})
    .catch(e=>toast('Error: '+e.message));
};

/* ── add to specific date (browse) ── */
window.addToDate = (date,inputId,tagId) => {
  const inp=document.getElementById(inputId);
  const text=inp.value.trim(); if(!text) return; inp.value='';
  const tag=document.getElementById(tagId)?.value||'design';
  push(TREF,{text,tag,done:false,date,time:timeStr12(),createdAt:Date.now()})
    .catch(e=>toast('Error: '+e.message));
};

/* ── toggle / delete ── */
window.toggleDone = (id,done) => update(ref(db,`daily_tasks/${id}`),{done:!done}).catch(e=>toast(e.message));
window.del = id => remove(ref(db,`daily_tasks/${id}`)).then(()=>toast('Removed')).catch(e=>toast(e.message));

/* ── render main ── */
function render() {
  if(browseMode){ renderBrowse(); return; }
  const today=dateStr(0), yest=dateStr(-1);
  const byDate = d => allTasks.filter(t=>t.date===d).sort((a,b)=> a.sortOrder!=null&&b.sortOrder!=null ? a.sortOrder-b.sortOrder : (a.createdAt??0)-(b.createdAt??0));
  const todayT=byDate(today), yesterT=byDate(yest);

  $('cnt-today').textContent    = todayT.length  ? `${todayT.length} task${todayT.length!==1?'s':''}` : '';
  $('cnt-yesterday').textContent= yesterT.length ? `${yesterT.length} task${yesterT.length!==1?'s':''}` : '';
  $('list-today').innerHTML    = todayT.length  ? todayT.map(taskRow).join('')  : '<div class="empty">Nothing logged yet today.</div>';
  $('list-yesterday').innerHTML= yesterT.length ? yesterT.map(taskRow).join('') : '<div class="empty">Nothing from yesterday.</div>';
}

/* ── render browse ── */
function renderBrowse() {
  const dateSet=new Set(allTasks.map(t=>t.date).filter(Boolean));
  dateSet.add(dateStr(0));
  const dates=[...dateSet].sort((a,b)=>b.localeCompare(a));

  $('browse-sections').innerHTML = dates.map(date => {
    const tasks=allTasks.filter(t=>t.date===date).sort((a,b)=> a.sortOrder!=null&&b.sortOrder!=null ? a.sortOrder-b.sortOrder : (a.createdAt??0)-(b.createdAt??0));
    const isToday=date===dateStr(0);
    const iid=`bi-${date}`, tid=`bt-${date}`;
    return `
    <div class="section">
      <div class="sec-hdr">
        <div class="sec-label ${isToday?'today':''}">${esc(prettyDate(date))}</div>
        <div class="sec-count">${tasks.length?tasks.length+' task'+(tasks.length!==1?'s':''):''}</div>
        <div class="sec-line"></div>
        <span class="sec-date-tag">${esc(date)}</span>
      </div>
      <div id="browse-tasks-${esc(date)}">
        ${tasks.length ? tasks.map(taskRow).join('') : '<div class="empty">Nothing logged.</div>'}
      </div>
      <div class="sec-add">
        <input id="${esc(iid)}" class="sec-add-input"
          placeholder="Add to this day…"
          onkeydown="if(event.key==='Enter') addToDate('${esc(date)}','${esc(iid)}','${esc(tid)}')" />
        <select id="${esc(tid)}" class="sec-tag-sel">
          <option value="design">Design</option>
          <option value="design-change">Design Change</option>
          <option value="research">Research</option>
          <option value="feedback">Feedback</option>
          <option value="meeting">Meeting</option>
          <option value="dev">Dev</option>
          <option value="review">Review</option>
          <option value="other">Other</option>
        </select>
        <button class="sec-add-btn" onclick="addToDate('${esc(date)}','${esc(iid)}','${esc(tid)}')">+ Add</button>
      </div>
    </div>`;
  }).join('');
}

/* ── task row ── */
function taskRow(t) {
  const tag=(t.tag||'other').replace(/\s+/g,'-').toLowerCase();
  return `
  <div class="task ${t.done?'done':''}" data-id="${t.id}" draggable="true">
    <div class="drag-handle" title="Drag to reorder">
      <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
        <circle cx="2" cy="2"   r="1.1" fill="currentColor"/>
        <circle cx="6" cy="2"   r="1.1" fill="currentColor"/>
        <circle cx="2" cy="6.5" r="1.1" fill="currentColor"/>
        <circle cx="6" cy="6.5" r="1.1" fill="currentColor"/>
        <circle cx="2" cy="11"  r="1.1" fill="currentColor"/>
        <circle cx="6" cy="11"  r="1.1" fill="currentColor"/>
      </svg>
    </div>
    <div class="cb" onclick="toggleDone('${t.id}',${t.done})">
      <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
        <path d="M1 3L3.5 5.5L8 1" stroke="var(--bg)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-text" id="txt-${t.id}">${esc(t.text)}</div>
      <div class="task-meta">
        <span class="tag-pill tag-${esc(tag)}">${esc(t.tag||'other')}</span>
        ${t.time?`<span class="task-time">${esc(t.time)}</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="task-btn" data-edit-id="${t.id}" title="Edit">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M8.5 1.5a1.5 1.5 0 012.121 2.121L4 10.243l-2.5.5.5-2.5L8.5 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="task-btn del" onclick="del('${t.id}')" title="Remove">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 2L8 8M8 2L2 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>`;
}

/* ── INLINE EDIT ── */
function startEdit(id) {
  const textEl = document.getElementById('txt-' + id);
  if (!textEl || textEl.style.display === 'none') return;
  const currentText = textEl.textContent;
  const parent = textEl.parentElement;
  textEl.style.display = 'none';

  const inp = document.createElement('input');
  inp.className = 'task-edit-input';
  inp.value = currentText;
  parent.insertBefore(inp, textEl);
  inp.focus();
  inp.select();

  const save = () => {
    const val = inp.value.trim();
    if (val && val !== currentText) {
      update(ref(db, `daily_tasks/${id}`), { text: val }).catch(e => toast(e.message));
    }
    inp.remove();
    textEl.style.display = '';
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = currentText; inp.blur(); }
  });
}

// Delegated click for edit buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-edit-id]');
  if (btn) startEdit(btn.dataset.editId);
});

updateThemeIcon(document.documentElement.getAttribute('data-theme'));
formatHeader();

/* ── DRAG & DROP ── */
let dragId = null;

function bindDrag(container) {
  container.querySelectorAll('.task[data-id]').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      container.querySelectorAll('.task').forEach(t => t.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.task').forEach(t => t.classList.remove('drag-over'));
      if (el.dataset.id !== dragId) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', async e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const targetId = el.dataset.id;
      if (!dragId || dragId === targetId) return;

      // Get current visible order in this container
      const ids = [...container.querySelectorAll('.task[data-id]')].map(t => t.dataset.id);
      const si = ids.indexOf(dragId), ti = ids.indexOf(targetId);
      if (si < 0 || ti < 0) return;
      ids.splice(si, 1);
      ids.splice(ti, 0, dragId);

      // Write sortOrder for all tasks in this list
      const updates = {};
      ids.forEach((id, i) => { updates[`daily_tasks/${id}/sortOrder`] = i * 1000; });
      update(ref(db), updates).catch(() => toast('Reorder failed'));
      dragId = null;
    });
  });
}

// Observe DOM changes and rebind drag on every render
const observer = new MutationObserver(() => {
  ['list-today','list-yesterday'].forEach(id => {
    const el = document.getElementById(id);
    if (el) bindDrag(el);
  });
  document.querySelectorAll('[id^="browse-tasks-"]').forEach(el => bindDrag(el));
});
observer.observe(document.getElementById('app'), { childList: true, subtree: true });
</script>
